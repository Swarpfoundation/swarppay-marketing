<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SwarpPay — Digital Products and Prepaid Value for Morocco</title>
  <desc id="desc">SwarpPay brand social preview card with logo and product positioning.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#35d8d0" stop-opacity="0.24"/>
      <stop offset="55%" stop-color="#35d8d0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#35d8d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#69f2ea"/>
      <stop offset="100%" stop-color="#18afa8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#000"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="1010" cy="80" r="210" fill="#35d8d0" opacity="0.06"/>
  <circle cx="160" cy="570" r="260" fill="#35d8d0" opacity="0.06"/>
  <g transform="translate(86 82)">
    <image href="/swarp-logo.png" width="104" height="104" preserveAspectRatio="xMidYMid meet"/>
    <text x="132" y="66" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">Swarp<tspan fill="#35d8d0">Pay</tspan></text>
  </g>
  <text x="92" y="260" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">
    Digital products and
  </text>
  <text x="92" y="348" fill="url(#brand)" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">
    prepaid value for Morocco
  </text>
  <text x="96" y="432" fill="#ffffff" opacity="0.68" font-family="Arial, Helvetica, sans-serif" font-size="30">
    Buy gift cards, telecom top-ups, gaming vouchers,
  </text>
  <text x="96" y="472" fill="#ffffff" opacity="0.68" font-family="Arial, Helvetica, sans-serif" font-size="30">
    streaming cards, and prepaid digital products.
  </text>
  <g transform="translate(92 536)">
    <rect width="250" height="46" fill="none" stroke="#35d8d0" stroke-opacity="0.55"/>
    <text x="24" y="30" fill="#35d8d0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="3">SWARPPAY.COM</text>
  </g>
